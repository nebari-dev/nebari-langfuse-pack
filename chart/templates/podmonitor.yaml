{{- if .Values.metrics.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "nebari-langfuse.appName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-langfuse.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  podMetricsEndpoints:
    - port: {{ .Values.metrics.podMonitor.port | default "http" | quote }}
      path: {{ .Values.metrics.podMonitor.path | default "/metrics" }}
      interval: {{ .Values.metrics.podMonitor.interval | default "30s" }}
{{- end }}
