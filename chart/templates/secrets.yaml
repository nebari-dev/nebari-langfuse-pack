{{- if .Values.secrets.generate }}
{{- $name := include "nebari-langfuse.secretsName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $data := (and $existing $existing.data) | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-langfuse.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  # 64-char hex (256-bit) required by Langfuse ENCRYPTION_KEY; sha256sum yields exactly 64 hex chars.
  encryptionKey: {{ (index $data "encryptionKey") | default (sha256sum (randAlphaNum 32) | b64enc) }}
  salt: {{ (index $data "salt") | default (randAlphaNum 32 | b64enc) }}
  nextauth-secret: {{ (index $data "nextauth-secret") | default (randAlphaNum 32 | b64enc) }}
  postgres-password: {{ (index $data "postgres-password") | default (randAlphaNum 24 | b64enc) }}
  redis-password: {{ (index $data "redis-password") | default (randAlphaNum 24 | b64enc) }}
  clickhouse-password: {{ (index $data "clickhouse-password") | default (randAlphaNum 24 | b64enc) }}
  root-user: {{ (index $data "root-user") | default ("langfuse" | b64enc) }}
  root-password: {{ (index $data "root-password") | default (randAlphaNum 24 | b64enc) }}
{{- end }}
