suite: generated secrets
templates:
  - templates/secrets.yaml
tests:
  - it: renders the secret with all required keys when generation is enabled
    set:
      secrets.generate: true
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: langfuse-secrets
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
      - isNotNullOrEmpty:
          path: data.salt
      - isNotNullOrEmpty:
          path: data.encryptionKey
      - isNotNullOrEmpty:
          path: data["nextauth-secret"]
      - isNotNullOrEmpty:
          path: data["postgres-password"]
      - isNotNullOrEmpty:
          path: data["redis-password"]
      - isNotNullOrEmpty:
          path: data["clickhouse-password"]
      - isNotNullOrEmpty:
          path: data["root-user"]
      - isNotNullOrEmpty:
          path: data["root-password"]
  - it: does not render when generation is disabled
    set:
      secrets.generate: false
    asserts:
      - hasDocuments:
          count: 0
